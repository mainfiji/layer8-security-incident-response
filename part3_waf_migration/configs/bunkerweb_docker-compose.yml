version: '3.8'

services:
  bunkerweb:
    image: bunkerity/bunkerweb:latest
    container_name: bunkerweb
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "9443:9443"   # веб-интерфейс
    environment:
      - SERVER_NAME=layer8.ag
      - USE_BUNKERNET=yes
      - USE_WEB_UI=yes
      - WEB_UI_LOGIN=admin
      - WEB_UI_PASSWORD=SecurePassword123
      - USE_ANTIBOT=yes
      - ANTIBOT_URI=/bot
      - USE_LIMIT_REQ=yes
      - LIMIT_REQ_URL=/
      - LIMIT_REQ_RATE=60r/m
      - USE_GEOIP=yes
      - BLACKLIST_IP_URLS=https://lists.blocklist.de/lists/all.txt
      - LOG_LEVEL=info
      - CUSTOM_LOG_FORMAT=json
    volumes:
      - bw_data:/data
    networks:
      - webnet

volumes:
  bw_data:

networks:
  webnet:
    driver: bridge
