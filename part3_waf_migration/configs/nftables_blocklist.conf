# Блокировка IP-адресов из чёрного списка (IOC)
# Файл: /etc/nftables/blocklist.nft

table inet filter {
    set blocklist {
        type ipv4_addr
        flags interval
        elements = {
            185.130.5.0/24,
            91.234.32.0/20,
            103.224.182.0/24,
            45.155.205.0/24,
            94.102.48.0/20,
            2.56.0.0/13,
            5.8.0.0/16
        }
    }

    chain input {
        type filter hook input priority 0; policy drop;
        ct state established,related accept
        ip saddr @blocklist drop
        # ... остальные правила
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        ip saddr @blocklist drop
        # ... остальные правила
    }
}
